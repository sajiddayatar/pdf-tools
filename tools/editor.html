<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Editor — PDFTools</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* ── LAYOUT ── */
    .editor-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 1rem;
      margin-top: 1.5rem;
      align-items: start;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      position: sticky;
      top: 70px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .sidebar-section {
      margin-bottom: 0.5rem;
    }

    .sidebar-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .tool-btn {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      padding: 0.55rem 0.8rem;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      transition: all 0.15s;
      margin-bottom: 3px;
    }

    .tool-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tool-btn.active { background: rgba(255,85,51,0.12); border-color: var(--accent); color: var(--accent); }

    .color-row {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .color-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s;
    }
    .color-dot.active { border-color: #fff; }

    .size-slider {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .color-picker-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .color-picker-row input[type="color"] {
      width: 32px;
      height: 28px;
      padding: 2px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
    }

    /* ── CANVAS AREA ── */
    .canvas-area {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .canvas-toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .canvas-toolbar .page-info {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .canvas-wrapper {
      position: relative;
      overflow: auto;
      max-height: 75vh;
      display: flex;
      justify-content: center;
      padding: 1rem;
      background: #1e1e28;
    }

    #pdfCanvas {
      display: block;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      border-radius: 4px;
    }

    #drawCanvas {
      position: absolute;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 4px;
      cursor: crosshair;
    }

    /* text input overlay */
    #textInput {
      position: absolute;
      background: rgba(255,255,200,0.9);
      border: 2px dashed var(--accent);
      border-radius: 4px;
      min-width: 120px;
      min-height: 28px;
      padding: 4px 8px;
      font-family: Arial, sans-serif;
      font-size: 16px;
      color: #000;
      outline: none;
      resize: both;
      overflow: hidden;
      z-index: 20;
      display: none;
    }

    /* ── PAGE STRIP ── */
    .page-strip {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--border);
      overflow-x: auto;
    }

    .page-mini {
      flex-shrink: 0;
      width: 60px;
      height: 80px;
      border: 2px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.15s;
      background: #fff;
    }

    .page-mini.active { border-color: var(--accent); }
    .page-mini canvas { width: 100%; height: 100%; object-fit: contain; }

    @media (max-width: 768px) {
      .editor-layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="../index.html">PDF<span>Tools</span></a>
</nav>

<div class="tool-page" style="max-width:1200px">
  <div class="tool-page-header">
    <a class="back-link" href="../index.html">← Back to tools</a>
    <h1>✏️ PDF Editor</h1>
    <p>Add text, draw freehand, highlight, insert shapes, and sign your PDF.</p>
  </div>

  <!-- Upload -->
  <div class="drop-zone" id="dropZone">
    <input type="file" accept=".pdf" id="fileInput">
    <div class="drop-icon">✏️</div>
    <h3>Drop your PDF here to start editing</h3>
    <p>or click to browse</p>
  </div>

  <!-- Editor UI -->
  <div id="editorUI" style="display:none">
    <div class="editor-layout">

      <!-- ── SIDEBAR ── -->
      <div class="sidebar">

        <div class="sidebar-section">
          <div class="sidebar-label">Tools</div>
          <button class="tool-btn active" data-tool="select">🖱️ Select / Move</button>
          <button class="tool-btn" data-tool="text">T&nbsp; Add Text</button>
          <button class="tool-btn" data-tool="draw">✏️ Freehand Draw</button>
          <button class="tool-btn" data-tool="highlight">🖊️ Highlight</button>
          <button class="tool-btn" data-tool="rect">▭ Rectangle</button>
          <button class="tool-btn" data-tool="ellipse">○ Ellipse</button>
          <button class="tool-btn" data-tool="line">╱ Line</button>
          <button class="tool-btn" data-tool="arrow">↗ Arrow</button>
          <button class="tool-btn" data-tool="signature">✍️ Signature</button>
          <button class="tool-btn" data-tool="eraser">⬜ Eraser</button>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-label">Color</div>
          <div class="color-row" id="colorRow">
            <div class="color-dot active" style="background:#e53e3e" data-color="#e53e3e"></div>
            <div class="color-dot" style="background:#000000" data-color="#000000"></div>
            <div class="color-dot" style="background:#2b6cb0" data-color="#2b6cb0"></div>
            <div class="color-dot" style="background:#276749" data-color="#276749"></div>
            <div class="color-dot" style="background:#f6ad55" data-color="#f6ad55"></div>
            <div class="color-dot" style="background:#9f7aea" data-color="#9f7aea"></div>
            <div class="color-dot" style="background:#ffffff" data-color="#ffffff" style="border:1px solid #555"></div>
          </div>
          <div class="color-picker-row" style="margin-top:0.5rem">
            <input type="color" id="customColor" value="#e53e3e" title="Custom color">
            <span style="font-size:0.75rem;color:var(--muted)">Custom</span>
          </div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-label">Size / Opacity</div>
          <div style="font-size:0.72rem;color:var(--muted);margin-bottom:3px">Stroke: <span id="sizeVal">3</span>px</div>
          <input type="range" class="size-slider" id="strokeSize" min="1" max="30" value="3">
          <div style="font-size:0.72rem;color:var(--muted);margin:6px 0 3px">Opacity: <span id="opacityVal">100</span>%</div>
          <input type="range" class="size-slider" id="opacitySlider" min="10" max="100" value="100">
        </div>

        <div class="sidebar-section">
          <div class="sidebar-label">Text Options</div>
          <select id="textFont" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:0.4rem;font-family:var(--font-mono);font-size:0.78rem;margin-bottom:4px">
            <option value="Arial">Arial</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Courier New">Courier New</option>
            <option value="Georgia">Georgia</option>
            <option value="Verdana">Verdana</option>
          </select>
          <div style="font-size:0.72rem;color:var(--muted);margin-bottom:3px">Font size: <span id="fontSizeVal">16</span>px</div>
          <input type="range" class="size-slider" id="textSize" min="8" max="72" value="16">
        </div>

        <div class="sidebar-section">
          <div class="sidebar-label">Actions</div>
          <button class="tool-btn" id="undoBtn">↩ Undo</button>
          <button class="tool-btn" id="redoBtn">↪ Redo</button>
          <button class="tool-btn" id="clearPageBtn">🗑 Clear Page</button>
        </div>

      </div>

      <!-- ── CANVAS AREA ── -->
      <div class="canvas-area">
        <div class="canvas-toolbar">
          <button class="btn btn-secondary" id="prevPage" style="padding:0.4rem 0.8rem;font-size:0.8rem">◀</button>
          <span class="page-info" id="pageInfo">Page 1 of 1</span>
          <button class="btn btn-secondary" id="nextPage" style="padding:0.4rem 0.8rem;font-size:0.8rem">▶</button>
          <button class="btn btn-secondary" id="zoomOut" style="padding:0.4rem 0.8rem;font-size:0.8rem">−</button>
          <span id="zoomInfo" style="font-size:0.78rem;color:var(--muted)">100%</span>
          <button class="btn btn-secondary" id="zoomIn" style="padding:0.4rem 0.8rem;font-size:0.8rem">+</button>
          <div style="flex:1"></div>
          <button class="btn btn-primary" id="saveBtn">💾 Save PDF</button>
        </div>

        <div class="canvas-wrapper" id="canvasWrapper">
          <canvas id="pdfCanvas"></canvas>
          <canvas id="drawCanvas"></canvas>
          <textarea id="textInput" spellcheck="false"></textarea>
        </div>

        <div class="page-strip" id="pageStrip"></div>
      </div>

    </div>

    <div class="status-msg" id="status" style="margin-top:1rem"></div>
  </div>
</div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="../js/common.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const { PDFDocument, rgb, StandardFonts, degrees } = PDFLib;

// ── STATE ──────────────────────────────────────────────
let pdfJsDoc = null;
let pdfLibDoc = null;
let currentPage = 1;
let totalPages = 0;
let scale = 1.4;
let currentTool = 'select';
let currentColor = '#e53e3e';
let strokeSize = 3;
let opacity = 1;
let textFontFamily = 'Arial';
let textFontSize = 16;

// Per-page annotation arrays
let annotations = {};   // { pageNum: [ {...}, ... ] }
let undoStack = {};     // { pageNum: [ [...] ] }
let redoStack = {};     // { pageNum: [ [...] ] }

// Drawing state
let isDrawing = false;
let drawPath = [];
let shapeStart = null;
let currentStroke = null;

// Signature state
let sigMode = false;

// Source bytes
let originalPdfBytes = null;
let currentFile = null;

const pdfCanvas    = document.getElementById('pdfCanvas');
const drawCanvas   = document.getElementById('drawCanvas');
const pdfCtx       = pdfCanvas.getContext('2d');
const drawCtx      = drawCanvas.getContext('2d');
const textInput    = document.getElementById('textInput');
const status       = document.getElementById('status');

// ── LOAD PDF ──────────────────────────────────────────
Utils.setupDropZone(document.getElementById('dropZone'), async files => {
  if (!files[0]) return;
  currentFile = files[0];
  await loadPDF(currentFile);
});

async function loadPDF(file) {
  Utils.showStatus(status, 'Loading PDF...', 'info');
  originalPdfBytes = await Utils.readFileAsArrayBuffer(file);
  pdfJsDoc  = await pdfjsLib.getDocument({ data: originalPdfBytes }).promise;
  pdfLibDoc = await PDFDocument.load(originalPdfBytes, { ignoreEncryption: true });
  totalPages = pdfJsDoc.numPages;
  currentPage = 1;

  // Init annotation storage
  for (let i = 1; i <= totalPages; i++) {
    if (!annotations[i]) annotations[i] = [];
    if (!undoStack[i])   undoStack[i]   = [];
    if (!redoStack[i])   redoStack[i]   = [];
  }

  document.getElementById('editorUI').style.display = 'block';
  document.getElementById('dropZone').style.display = 'none';
  Utils.hideStatus(status);

  await buildPageStrip();
  await renderPage();
}

// ── RENDER PAGE ───────────────────────────────────────
async function renderPage() {
  const page = await pdfJsDoc.getPage(currentPage);
  const viewport = page.getViewport({ scale });

  pdfCanvas.width  = viewport.width;
  pdfCanvas.height = viewport.height;
  drawCanvas.width  = viewport.width;
  drawCanvas.height = viewport.height;

  await page.render({ canvasContext: pdfCtx, viewport }).promise;
  redrawAnnotations();
  updatePageInfo();
  highlightStrip();
}

// ── REDRAW ALL ANNOTATIONS ON DRAW CANVAS ─────────────
function redrawAnnotations() {
  drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  const ann = annotations[currentPage] || [];
  ann.forEach(a => drawAnnotation(a));
}

function drawAnnotation(a) {
  drawCtx.save();
  drawCtx.globalAlpha = a.opacity ?? 1;
  drawCtx.strokeStyle = a.color || '#e53e3e';
  drawCtx.fillStyle   = a.color || '#e53e3e';
  drawCtx.lineWidth   = a.size  || 3;
  drawCtx.lineCap     = 'round';
  drawCtx.lineJoin    = 'round';

  if (a.type === 'draw' || a.type === 'signature') {
    if (!a.points || a.points.length < 2) {
      drawCtx.restore(); return;
    }
    drawCtx.beginPath();
    drawCtx.moveTo(a.points[0].x, a.points[0].y);
    a.points.forEach(p => drawCtx.lineTo(p.x, p.y));
    drawCtx.stroke();

  } else if (a.type === 'highlight') {
    drawCtx.globalAlpha = 0.35;
    drawCtx.fillStyle   = a.color;
    if (a.points && a.points.length >= 2) {
      drawCtx.beginPath();
      drawCtx.moveTo(a.points[0].x, a.points[0].y);
      a.points.forEach(p => drawCtx.lineTo(p.x, p.y));
      drawCtx.lineWidth = a.size || 16;
      drawCtx.strokeStyle = a.color;
      drawCtx.stroke();
    }

  } else if (a.type === 'text') {
    drawCtx.globalAlpha = a.opacity ?? 1;
    drawCtx.font = `${a.fontSize || 16}px ${a.fontFamily || 'Arial'}`;
    drawCtx.fillStyle = a.color;
    const lines = a.text.split('\n');
    lines.forEach((line, i) => {
      drawCtx.fillText(line, a.x, a.y + i * (a.fontSize || 16) * 1.2);
    });

  } else if (a.type === 'rect') {
    drawCtx.strokeRect(a.x, a.y, a.w, a.h);
    if (a.fill) { drawCtx.globalAlpha *= 0.15; drawCtx.fillRect(a.x, a.y, a.w, a.h); }

  } else if (a.type === 'ellipse') {
    drawCtx.beginPath();
    drawCtx.ellipse(a.x + a.w/2, a.y + a.h/2, Math.abs(a.w/2), Math.abs(a.h/2), 0, 0, Math.PI * 2);
    drawCtx.stroke();

  } else if (a.type === 'line') {
    drawCtx.beginPath();
    drawCtx.moveTo(a.x, a.y);
    drawCtx.lineTo(a.x2, a.y2);
    drawCtx.stroke();

  } else if (a.type === 'arrow') {
    const dx = a.x2 - a.x, dy = a.y2 - a.y;
    const angle = Math.atan2(dy, dx);
    const len = 12 + a.size;
    drawCtx.beginPath();
    drawCtx.moveTo(a.x, a.y);
    drawCtx.lineTo(a.x2, a.y2);
    drawCtx.stroke();
    drawCtx.beginPath();
    drawCtx.moveTo(a.x2, a.y2);
    drawCtx.lineTo(a.x2 - len * Math.cos(angle - 0.4), a.y2 - len * Math.sin(angle - 0.4));
    drawCtx.lineTo(a.x2 - len * Math.cos(angle + 0.4), a.y2 - len * Math.sin(angle + 0.4));
    drawCtx.closePath();
    drawCtx.fill();
  }

  drawCtx.restore();
}

// ── POINTER EVENTS ────────────────────────────────────
function getPos(e) {
  const rect = drawCanvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: (clientX - rect.left) * (drawCanvas.width  / rect.width),
    y: (clientY - rect.top)  * (drawCanvas.height / rect.height)
  };
}

drawCanvas.addEventListener('mousedown', onPointerDown);
drawCanvas.addEventListener('mousemove', onPointerMove);
drawCanvas.addEventListener('mouseup',   onPointerUp);
drawCanvas.addEventListener('mouseleave', onPointerUp);
drawCanvas.addEventListener('touchstart', e => { e.preventDefault(); onPointerDown(e); }, { passive: false });
drawCanvas.addEventListener('touchmove',  e => { e.preventDefault(); onPointerMove(e); }, { passive: false });
drawCanvas.addEventListener('touchend',   e => { e.preventDefault(); onPointerUp(e); }, { passive: false });

function onPointerDown(e) {
  const pos = getPos(e);

  if (currentTool === 'text') {
    placeTextInput(pos);
    return;
  }
  if (currentTool === 'select') return;

  commitTextInput();
  isDrawing = true;
  shapeStart = pos;

  if (currentTool === 'draw' || currentTool === 'highlight' || currentTool === 'signature' || currentTool === 'eraser') {
    drawPath = [pos];
  }
}

function onPointerMove(e) {
  if (!isDrawing) return;
  const pos = getPos(e);

  if (currentTool === 'draw' || currentTool === 'highlight' || currentTool === 'signature') {
    drawPath.push(pos);
    // Live preview
    redrawAnnotations();
    const liveAnn = {
      type: currentTool === 'highlight' ? 'highlight' : (currentTool === 'signature' ? 'signature' : 'draw'),
      points: drawPath, color: currentColor, size: currentTool === 'highlight' ? Math.max(strokeSize * 4, 16) : strokeSize,
      opacity: currentTool === 'highlight' ? 0.35 : opacity
    };
    drawAnnotation(liveAnn);

  } else if (currentTool === 'eraser') {
    // Erase nearby annotations
    const r = strokeSize * 4;
    annotations[currentPage] = (annotations[currentPage] || []).filter(a => {
      if (a.type === 'draw' || a.type === 'highlight' || a.type === 'signature') {
        return !a.points.some(p => Math.hypot(p.x - pos.x, p.y - pos.y) < r);
      }
      return true;
    });
    drawPath.push(pos);
    redrawAnnotations();

  } else {
    // Shape preview
    redrawAnnotations();
    drawCtx.save();
    drawCtx.globalAlpha = opacity;
    drawCtx.strokeStyle = currentColor;
    drawCtx.fillStyle   = currentColor;
    drawCtx.lineWidth   = strokeSize;
    drawCtx.lineCap     = 'round';
    const dx = pos.x - shapeStart.x, dy = pos.y - shapeStart.y;

    if (currentTool === 'rect') {
      drawCtx.strokeRect(shapeStart.x, shapeStart.y, dx, dy);
    } else if (currentTool === 'ellipse') {
      drawCtx.beginPath();
      drawCtx.ellipse(shapeStart.x + dx/2, shapeStart.y + dy/2, Math.abs(dx/2), Math.abs(dy/2), 0, 0, Math.PI*2);
      drawCtx.stroke();
    } else if (currentTool === 'line') {
      drawCtx.beginPath(); drawCtx.moveTo(shapeStart.x, shapeStart.y); drawCtx.lineTo(pos.x, pos.y); drawCtx.stroke();
    } else if (currentTool === 'arrow') {
      const angle = Math.atan2(dy, dx); const len = 12 + strokeSize;
      drawCtx.beginPath(); drawCtx.moveTo(shapeStart.x, shapeStart.y); drawCtx.lineTo(pos.x, pos.y); drawCtx.stroke();
      drawCtx.beginPath();
      drawCtx.moveTo(pos.x, pos.y);
      drawCtx.lineTo(pos.x - len*Math.cos(angle-0.4), pos.y - len*Math.sin(angle-0.4));
      drawCtx.lineTo(pos.x - len*Math.cos(angle+0.4), pos.y - len*Math.sin(angle+0.4));
      drawCtx.closePath(); drawCtx.fill();
    }
    drawCtx.restore();
  }
}

function onPointerUp(e) {
  if (!isDrawing) return;
  isDrawing = false;
  const pos = e.type === 'mouseleave' ? shapeStart : getPos(e);

  saveUndoState();

  if (currentTool === 'draw' || currentTool === 'signature') {
    if (drawPath.length > 1) {
      annotations[currentPage].push({ type: currentTool === 'signature' ? 'signature' : 'draw', points: [...drawPath], color: currentColor, size: strokeSize, opacity });
    }
  } else if (currentTool === 'highlight') {
    if (drawPath.length > 1) {
      annotations[currentPage].push({ type: 'highlight', points: [...drawPath], color: currentColor, size: Math.max(strokeSize * 4, 16), opacity: 0.35 });
    }
  } else if (currentTool === 'eraser') {
    // already applied
  } else if (currentTool === 'rect') {
    annotations[currentPage].push({ type: 'rect', x: shapeStart.x, y: shapeStart.y, w: pos.x - shapeStart.x, h: pos.y - shapeStart.y, color: currentColor, size: strokeSize, opacity });
  } else if (currentTool === 'ellipse') {
    const dx = pos.x - shapeStart.x, dy = pos.y - shapeStart.y;
    annotations[currentPage].push({ type: 'ellipse', x: shapeStart.x, y: shapeStart.y, w: dx, h: dy, color: currentColor, size: strokeSize, opacity });
  } else if (currentTool === 'line') {
    annotations[currentPage].push({ type: 'line', x: shapeStart.x, y: shapeStart.y, x2: pos.x, y2: pos.y, color: currentColor, size: strokeSize, opacity });
  } else if (currentTool === 'arrow') {
    annotations[currentPage].push({ type: 'arrow', x: shapeStart.x, y: shapeStart.y, x2: pos.x, y2: pos.y, color: currentColor, size: strokeSize, opacity });
  }

  redrawAnnotations();
}

// ── TEXT INPUT ─────────────────────────────────────────
function placeTextInput(pos) {
  commitTextInput();
  const rect = drawCanvas.getBoundingClientRect();
  const wrapper = document.getElementById('canvasWrapper');
  const wRect = wrapper.getBoundingClientRect();
  const canvasOffsetX = rect.left - wRect.left + wrapper.scrollLeft;
  const canvasOffsetY = rect.top  - wRect.top  + wrapper.scrollTop;
  const scaleX = rect.width  / drawCanvas.width;
  const scaleY = rect.height / drawCanvas.height;

  textInput.style.left    = (canvasOffsetX + pos.x * scaleX) + 'px';
  textInput.style.top     = (canvasOffsetY + pos.y * scaleY) + 'px';
  textInput.style.fontSize = textFontSize + 'px';
  textInput.style.fontFamily = textFontFamily;
  textInput.style.color   = currentColor;
  textInput.dataset.x     = pos.x;
  textInput.dataset.y     = pos.y;
  textInput.style.display = 'block';
  textInput.value         = '';
  textInput.focus();
}

function commitTextInput() {
  if (textInput.style.display === 'none') return;
  const text = textInput.value.trim();
  if (text) {
    saveUndoState();
    annotations[currentPage].push({
      type: 'text', text,
      x: parseFloat(textInput.dataset.x),
      y: parseFloat(textInput.dataset.y) + textFontSize,
      color: currentColor,
      fontSize: textFontSize,
      fontFamily: textFontFamily,
      opacity
    });
    redrawAnnotations();
  }
  textInput.style.display = 'none';
  textInput.value = '';
}

textInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') { textInput.style.display = 'none'; }
});

drawCanvas.addEventListener('click', e => {
  if (currentTool !== 'text') commitTextInput();
});

// ── UNDO / REDO ───────────────────────────────────────
function saveUndoState() {
  undoStack[currentPage].push(JSON.stringify(annotations[currentPage]));
  if (undoStack[currentPage].length > 50) undoStack[currentPage].shift();
  redoStack[currentPage] = [];
}

document.getElementById('undoBtn').onclick = () => {
  commitTextInput();
  if (!undoStack[currentPage].length) return;
  redoStack[currentPage].push(JSON.stringify(annotations[currentPage]));
  annotations[currentPage] = JSON.parse(undoStack[currentPage].pop());
  redrawAnnotations();
};

document.getElementById('redoBtn').onclick = () => {
  if (!redoStack[currentPage].length) return;
  undoStack[currentPage].push(JSON.stringify(annotations[currentPage]));
  annotations[currentPage] = JSON.parse(redoStack[currentPage].pop());
  redrawAnnotations();
};

document.getElementById('clearPageBtn').onclick = () => {
  commitTextInput();
  saveUndoState();
  annotations[currentPage] = [];
  redrawAnnotations();
};

// ── SAVE PDF ──────────────────────────────────────────
document.getElementById('saveBtn').onclick = async () => {
  commitTextInput();
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  Utils.showStatus(status, 'Saving PDF with annotations...', 'info');

  try {
    const pdfDoc = await PDFDocument.load(originalPdfBytes, { ignoreEncryption: true });
    const font   = await pdfDoc.embedFont(StandardFonts.Helvetica);
    const pages  = pdfDoc.getPages();

    for (let p = 1; p <= totalPages; p++) {
      const ann = annotations[p] || [];
      if (!ann.length) continue;

      const pdfPage = pages[p - 1];
      const { width: pgW, height: pgH } = pdfPage.getSize();

      // We need the rendered canvas size for coordinate mapping
      const pdfJsPage = await pdfJsDoc.getPage(p);
      const vp = pdfJsPage.getViewport({ scale });
      const cvW = vp.width, cvH = vp.height;

      function cvX(x)  { return (x / cvW) * pgW; }
      function cvY(y)  { return pgH - (y / cvH) * pgH; }
      function cvS(s)  { return (s / cvW) * pgW; }

      function hexToRgb255(hex) {
        const r = parseInt(hex.slice(1,3),16)/255;
        const g = parseInt(hex.slice(3,5),16)/255;
        const b = parseInt(hex.slice(5,7),16)/255;
        return rgb(r, g, b);
      }

      for (const a of ann) {
        const c = hexToRgb255(a.color || '#000000');
        const op = a.opacity ?? 1;

        if (a.type === 'draw' || a.type === 'signature') {
          if (!a.points || a.points.length < 2) continue;
          for (let i = 0; i < a.points.length - 1; i++) {
            pdfPage.drawLine({
              start: { x: cvX(a.points[i].x),   y: cvY(a.points[i].y) },
              end:   { x: cvX(a.points[i+1].x), y: cvY(a.points[i+1].y) },
              thickness: cvS(a.size || 3),
              color: c, opacity: op
            });
          }
        } else if (a.type === 'highlight') {
          if (!a.points || a.points.length < 2) continue;
          for (let i = 0; i < a.points.length - 1; i++) {
            pdfPage.drawLine({
              start: { x: cvX(a.points[i].x),   y: cvY(a.points[i].y) },
              end:   { x: cvX(a.points[i+1].x), y: cvY(a.points[i+1].y) },
              thickness: cvS(a.size || 16),
              color: c, opacity: 0.35
            });
          }
        } else if (a.type === 'text') {
          const sz = Math.round(cvS(a.fontSize || 16));
          const lines = a.text.split('\n');
          lines.forEach((line, li) => {
            try {
              pdfPage.drawText(line, {
                x: cvX(a.x), y: cvY(a.y) - li * sz * 1.2,
                size: Math.max(6, sz), font, color: c, opacity: op
              });
            } catch(e) {}
          });
        } else if (a.type === 'rect') {
          const x = cvX(a.x), y2 = cvY(a.y), w = cvS(Math.abs(a.w)), h = cvS(Math.abs(a.h));
          pdfPage.drawRectangle({ x, y: y2 - h, width: w, height: h, borderColor: c, borderWidth: cvS(a.size||2), opacity: op });
        } else if (a.type === 'ellipse') {
          pdfPage.drawEllipse({
            x: cvX(a.x + a.w/2), y: cvY(a.y + a.h/2),
            xScale: cvS(Math.abs(a.w/2)), yScale: cvS(Math.abs(a.h/2)),
            borderColor: c, borderWidth: cvS(a.size||2), opacity: op
          });
        } else if (a.type === 'line' || a.type === 'arrow') {
          pdfPage.drawLine({
            start: { x: cvX(a.x),  y: cvY(a.y) },
            end:   { x: cvX(a.x2), y: cvY(a.y2) },
            thickness: cvS(a.size||2), color: c, opacity: op
          });
        }
      }
    }

    const outBytes = await pdfDoc.save();
    const name = (currentFile?.name || 'document').replace('.pdf', '') + '-edited.pdf';
    Utils.downloadBlob(new Blob([outBytes], { type: 'application/pdf' }), name);
    Utils.showStatus(status, '✓ PDF saved with all annotations!', 'success');
  } catch (err) {
    Utils.showStatus(status, '✕ Error saving: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
  }
};

// ── PAGE NAVIGATION ────────────────────────────────────
document.getElementById('prevPage').onclick = () => { if (currentPage > 1) { commitTextInput(); currentPage--; renderPage(); }};
document.getElementById('nextPage').onclick = () => { if (currentPage < totalPages) { commitTextInput(); currentPage++; renderPage(); }};
document.getElementById('zoomIn').onclick  = () => { scale = Math.min(scale + 0.2, 3); renderPage(); };
document.getElementById('zoomOut').onclick = () => { scale = Math.max(scale - 0.2, 0.4); renderPage(); };

function updatePageInfo() {
  document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
  document.getElementById('zoomInfo').textContent = Math.round(scale * 100 / 1.4) + '%';
  document.getElementById('prevPage').disabled = currentPage <= 1;
  document.getElementById('nextPage').disabled = currentPage >= totalPages;
}

// ── PAGE STRIP ─────────────────────────────────────────
async function buildPageStrip() {
  const strip = document.getElementById('pageStrip');
  strip.innerHTML = '';
  for (let i = 1; i <= totalPages; i++) {
    const mini = document.createElement('div');
    mini.className = 'page-mini' + (i === currentPage ? ' active' : '');
    mini.dataset.page = i;

    const mc = document.createElement('canvas');
    const pg = await pdfJsDoc.getPage(i);
    const vp = pg.getViewport({ scale: 0.15 });
    mc.width = vp.width; mc.height = vp.height;
    await pg.render({ canvasContext: mc.getContext('2d'), viewport: vp }).promise;
    mini.appendChild(mc);
    mini.onclick = () => { commitTextInput(); currentPage = i; renderPage(); };
    strip.appendChild(mini);
  }
}

function highlightStrip() {
  document.querySelectorAll('.page-mini').forEach(m => {
    m.classList.toggle('active', parseInt(m.dataset.page) === currentPage);
  });
}

// ── TOOL BUTTONS ──────────────────────────────────────
document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
  btn.onclick = () => {
    commitTextInput();
    currentTool = btn.dataset.tool;
    document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    // Cursor
    const cursorMap = {
      select: 'default', text: 'text', draw: 'crosshair', highlight: 'crosshair',
      rect: 'crosshair', ellipse: 'crosshair', line: 'crosshair', arrow: 'crosshair',
      signature: 'crosshair', eraser: 'cell'
    };
    drawCanvas.style.cursor = cursorMap[currentTool] || 'crosshair';
  };
});

// ── COLOR DOTS ────────────────────────────────────────
document.querySelectorAll('.color-dot').forEach(dot => {
  dot.onclick = () => {
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
    dot.classList.add('active');
    currentColor = dot.dataset.color;
    document.getElementById('customColor').value = currentColor;
  };
});

document.getElementById('customColor').oninput = e => {
  currentColor = e.target.value;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
};

// ── SIZE / OPACITY ────────────────────────────────────
document.getElementById('strokeSize').oninput = e => {
  strokeSize = parseInt(e.target.value);
  document.getElementById('sizeVal').textContent = strokeSize;
};

document.getElementById('opacitySlider').oninput = e => {
  opacity = parseInt(e.target.value) / 100;
  document.getElementById('opacityVal').textContent = e.target.value;
};

document.getElementById('textSize').oninput = e => {
  textFontSize = parseInt(e.target.value);
  document.getElementById('fontSizeVal').textContent = textFontSize;
};

document.getElementById('textFont').onchange = e => {
  textFontFamily = e.target.value;
};

// keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.target === textInput) return;
  const shortcuts = { 'v':'select','t':'text','d':'draw','h':'highlight','r':'rect','e':'ellipse','l':'line','a':'arrow','s':'signature','x':'eraser' };
  if (shortcuts[e.key]) {
    document.querySelector(`.tool-btn[data-tool="${shortcuts[e.key]}"]`)?.click();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); document.getElementById('undoBtn').click(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); document.getElementById('redoBtn').click(); }
});
</script>
</body>
</html>
