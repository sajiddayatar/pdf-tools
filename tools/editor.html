<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Editor — PDFTools</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .editor-wrap {
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 1rem;
      margin-top: 1.5rem;
      align-items: start;
    }
    .sidebar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      position: sticky;
      top: 70px;
    }
    .sb-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0.8rem 0 0.4rem;
    }
    .sb-label:first-child { margin-top: 0; }
    .tool-btn {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.15s;
      margin-bottom: 3px;
    }
    .tool-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tool-btn.active { background: rgba(255,85,51,0.12); border-color: var(--accent); color: var(--accent); }
    .color-swatches { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 6px; }
    .swatch {
      width: 22px; height: 22px;
      border-radius: 50%; cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s, transform 0.1s;
    }
    .swatch:hover { transform: scale(1.15); }
    .swatch.active { border-color: #fff; box-shadow: 0 0 0 1px #888; }
    .sb-slider { width: 100%; accent-color: var(--accent); cursor: pointer; margin-top: 2px; }
    .sb-val { font-size: 0.72rem; color: var(--muted); margin-bottom: 2px; }
    .canvas-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .canvas-toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .page-info-label {
      font-size: 0.78rem; color: var(--muted);
      min-width: 80px; text-align: center;
    }
    #editorViewport {
      position: relative;
      overflow: auto;
      background: #18181f;
      max-height: 72vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
    }
    #canvasContainer {
      position: relative;
      display: inline-block;
      line-height: 0;
      box-shadow: 0 4px 30px rgba(0,0,0,0.6);
    }
    #pdfCanvas { display: block; border-radius: 3px; }
    #drawCanvas {
      position: absolute;
      top: 0; left: 0;
      border-radius: 3px;
      cursor: crosshair;
    }
    #textBox {
      position: absolute;
      display: none;
      background: rgba(255,255,200,0.92);
      border: 2px dashed var(--accent);
      border-radius: 3px;
      padding: 3px 6px;
      font-size: 16px;
      color: #111;
      outline: none;
      min-width: 100px;
      min-height: 24px;
      resize: both;
      overflow: hidden;
      z-index: 10;
      white-space: pre-wrap;
    }
    .thumb-strip {
      display: flex; gap: 8px;
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      overflow-x: auto;
    }
    .thumb-item {
      flex-shrink: 0; width: 56px;
      border: 2px solid var(--border);
      border-radius: 4px; cursor: pointer;
      overflow: hidden; background: #fff;
      transition: border-color 0.15s;
    }
    .thumb-item.active { border-color: var(--accent); }
    .thumb-item canvas { width: 100%; display: block; }

    /* Upload area — simple, reliable */
    #uploadArea {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--surface);
      user-select: none;
    }
    #uploadArea:hover, #uploadArea.over {
      border-color: var(--accent);
      background: rgba(255,85,51,0.04);
    }
    #uploadArea .upload-icon { font-size: 3rem; margin-bottom: 1rem; }
    #uploadArea h3 { font-family: var(--font-head); margin-bottom: 0.4rem; }
    #uploadArea p { color: var(--muted); font-size: 0.82rem; }
    .upload-btn-wrap { margin-top: 1.2rem; }

    @media (max-width: 768px) {
      .editor-wrap { grid-template-columns: 1fr; }
      .sidebar { position: static; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="../index.html">PDF<span>Tools</span></a>
</nav>

<div class="tool-page" style="max-width:1200px">
  <div class="tool-page-header">
    <a class="back-link" href="../index.html">← Back to tools</a>
    <h1>✏️ PDF Editor</h1>
    <p>Add text, draw, highlight, shapes, arrows and signatures to any PDF.</p>
  </div>

  <!-- STATUS / ERROR -->
  <div class="status-msg" id="statusMsg" style="margin-bottom:1rem"></div>

  <!-- UPLOAD -->
  <div id="uploadArea">
    <div class="upload-icon">✏️</div>
    <h3>Select a PDF to start editing</h3>
    <p>Click the button below or drag &amp; drop a file here</p>
    <div class="upload-btn-wrap">
      <button class="btn btn-primary" id="browseBtn">📂 Browse PDF File</button>
    </div>
    <!-- hidden file input OUTSIDE the click-intercepting area -->
  </div>
  <input type="file" id="fileInput" accept=".pdf" style="display:none">

  <!-- EDITOR -->
  <div id="editorUI" style="display:none">
    <div class="editor-wrap">

      <!-- SIDEBAR -->
      <div class="sidebar">
        <div class="sb-label">Tools</div>
        <button class="tool-btn active" data-tool="draw">✏️ Draw <kbd style="margin-left:auto;opacity:.4;font-size:.65rem">D</kbd></button>
        <button class="tool-btn" data-tool="text">T&nbsp; Text <kbd style="margin-left:auto;opacity:.4;font-size:.65rem">T</kbd></button>
        <button class="tool-btn" data-tool="highlight">🖊️ Highlight <kbd style="margin-left:auto;opacity:.4;font-size:.65rem">H</kbd></button>
        <button class="tool-btn" data-tool="rect">▭ Rectangle <kbd style="margin-left:auto;opacity:.4;font-size:.65rem">R</kbd></button>
        <button class="tool-btn" data-tool="ellipse">○ Ellipse <kbd style="margin-left:auto;opacity:.4;font-size:.65rem">E</kbd></button>
        <button class="tool-btn" data-tool="line">╱ Line <kbd style="margin-left:auto;opacity:.4;font-size:.65rem">L</kbd></button>
        <button class="tool-btn" data-tool="arrow">↗ Arrow <kbd style="margin-left:auto;opacity:.4;font-size:.65rem">A</kbd></button>
        <button class="tool-btn" data-tool="signature">✍️ Signature <kbd style="margin-left:auto;opacity:.4;font-size:.65rem">S</kbd></button>
        <button class="tool-btn" data-tool="eraser">⬜ Eraser <kbd style="margin-left:auto;opacity:.4;font-size:.65rem">X</kbd></button>

        <div class="sb-label">Color</div>
        <div class="color-swatches" id="swatches">
          <div class="swatch active" data-color="#111111" style="background:#111111"></div>
          <div class="swatch" data-color="#e53e3e" style="background:#e53e3e"></div>
          <div class="swatch" data-color="#2b6cb0" style="background:#2b6cb0"></div>
          <div class="swatch" data-color="#276749" style="background:#276749"></div>
          <div class="swatch" data-color="#d69e2e" style="background:#d69e2e"></div>
          <div class="swatch" data-color="#9f7aea" style="background:#9f7aea"></div>
        </div>
        <input type="color" id="customColor" value="#111111"
          style="width:100%;height:30px;border-radius:6px;border:1px solid var(--border);background:var(--bg);cursor:pointer;padding:2px;margin-top:2px">

        <div class="sb-label">Stroke Size</div>
        <div class="sb-val">Size: <span id="szLabel">3</span>px</div>
        <input type="range" class="sb-slider" id="strokeSz" min="1" max="40" value="3">

        <div class="sb-label">Opacity</div>
        <div class="sb-val"><span id="opLabel">100</span>%</div>
        <input type="range" class="sb-slider" id="opSlider" min="10" max="100" value="100">

        <div class="sb-label">Text Options</div>
        <select id="textFont"
          style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px;font-family:var(--font-mono);font-size:0.78rem;margin-bottom:4px">
          <option>Arial</option>
          <option>Times New Roman</option>
          <option>Courier New</option>
          <option>Georgia</option>
          <option>Verdana</option>
        </select>
        <div class="sb-val">Font size: <span id="txSzLabel">18</span>px</div>
        <input type="range" class="sb-slider" id="textSz" min="8" max="80" value="18">

        <div class="sb-label">Actions</div>
        <button class="tool-btn" id="undoBtn">↩ Undo</button>
        <button class="tool-btn" id="redoBtn">↪ Redo</button>
        <button class="tool-btn" id="clearBtn">🗑 Clear Page</button>
        <button class="tool-btn" id="changeFileBtn">📂 Open Different PDF</button>
      </div>

      <!-- CANVAS PANEL -->
      <div class="canvas-panel">
        <div class="canvas-toolbar">
          <button class="btn btn-secondary" id="prevPage" style="padding:.35rem .7rem;font-size:.8rem">◀</button>
          <span class="page-info-label" id="pageInfo">Page 1 / 1</span>
          <button class="btn btn-secondary" id="nextPage" style="padding:.35rem .7rem;font-size:.8rem">▶</button>
          <button class="btn btn-secondary" id="zoomOut" style="padding:.35rem .7rem;font-size:.8rem">−</button>
          <span id="zoomLabel" style="font-size:.78rem;color:var(--muted);min-width:40px;text-align:center">100%</span>
          <button class="btn btn-secondary" id="zoomIn" style="padding:.35rem .7rem;font-size:.8rem">+</button>
          <div style="flex:1"></div>
          <button class="btn btn-primary" id="saveBtn">💾 Save PDF</button>
        </div>

        <div id="editorViewport">
          <div id="canvasContainer">
            <canvas id="pdfCanvas"></canvas>
            <canvas id="drawCanvas"></canvas>
            <div id="textBox" contenteditable="true" spellcheck="false"></div>
          </div>
        </div>

        <div class="thumb-strip" id="thumbStrip"></div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="../js/common.js"></script>
<script>
// Wait for everything to be ready
window.addEventListener('load', function () {

  // ── LIB CHECK ──────────────────────────────────────────────────────────────
  if (typeof pdfjsLib === 'undefined') {
    setStatus('⚠️ PDF.js failed to load. Check your internet connection and refresh.', 'error'); return;
  }
  if (typeof PDFLib === 'undefined') {
    setStatus('⚠️ pdf-lib failed to load. Check your internet connection and refresh.', 'error'); return;
  }

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // ── STATE ──────────────────────────────────────────────────────────────────
  let pdfJsDoc = null, pdfBytes = null, currentFile = null;
  let currentPage = 1, totalPages = 0, scale = 1.5;
  let activeTool = 'draw', strokeColor = '#111111', strokeSize = 3, opacity = 1.0;
  let textFont = 'Arial', textSize = 18;
  let ann = {}, undos = {}, redos = {};
  let drawing = false, pathPts = [], shapeStart = null;

  // ── DOM ────────────────────────────────────────────────────────────────────
  const uploadArea   = document.getElementById('uploadArea');
  const fileInput    = document.getElementById('fileInput');
  const browseBtn    = document.getElementById('browseBtn');
  const editorUI     = document.getElementById('editorUI');
  const pdfCanvas    = document.getElementById('pdfCanvas');
  const drawCanvas   = document.getElementById('drawCanvas');
  const pdfCtx       = pdfCanvas.getContext('2d');
  const drawCtx      = drawCanvas.getContext('2d');
  const textBox      = document.getElementById('textBox');
  const thumbStrip   = document.getElementById('thumbStrip');

  // ── FILE UPLOAD WIRING ─────────────────────────────────────────────────────
  // Button click → open file dialog
  browseBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    fileInput.click();
  });

  // Drag & drop on upload area
  uploadArea.addEventListener('dragover', function(e) {
    e.preventDefault(); e.stopPropagation();
    uploadArea.classList.add('over');
  });
  uploadArea.addEventListener('dragleave', function() {
    uploadArea.classList.remove('over');
  });
  uploadArea.addEventListener('drop', function(e) {
    e.preventDefault(); e.stopPropagation();
    uploadArea.classList.remove('over');
    const f = e.dataTransfer.files[0];
    if (f) openFile(f);
  });

  // File input change
  fileInput.addEventListener('change', function() {
    if (this.files && this.files.length > 0) {
      openFile(this.files[0]);
      this.value = '';
    }
  });

  // Change file button inside editor
  document.getElementById('changeFileBtn').addEventListener('click', function() {
    fileInput.click();
  });

  // ── OPEN / LOAD PDF ────────────────────────────────────────────────────────
  async function openFile(file) {
    if (!file) return;
    if (!file.name.toLowerCase().endsWith('.pdf') && file.type !== 'application/pdf') {
      setStatus('Please select a .pdf file.', 'error'); return;
    }
    setStatus('Loading PDF...', 'info');
    try {
      currentFile = file;
      const ab = await readFile(file);
      pdfBytes = ab;
      pdfJsDoc = await pdfjsLib.getDocument({ data: ab.slice(0) }).promise;
      totalPages = pdfJsDoc.numPages;
      currentPage = 1;
      for (let i = 1; i <= totalPages; i++) {
        if (!ann[i])   ann[i]   = [];
        if (!undos[i]) undos[i] = [];
        if (!redos[i]) redos[i] = [];
      }
      uploadArea.style.display = 'none';
      editorUI.style.display = 'block';
      hideStatus();
      await buildThumbs();
      await renderPage();
    } catch(err) {
      setStatus('Failed to load PDF: ' + err.message, 'error');
      console.error(err);
    }
  }

  function readFile(file) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload  = e => resolve(e.target.result);
      r.onerror = reject;
      r.readAsArrayBuffer(file);
    });
  }

  // ── RENDER PAGE ────────────────────────────────────────────────────────────
  async function renderPage() {
    try {
      const page = await pdfJsDoc.getPage(currentPage);
      const vp   = page.getViewport({ scale });
      pdfCanvas.width  = vp.width;  pdfCanvas.height  = vp.height;
      drawCanvas.width = vp.width;  drawCanvas.height = vp.height;
      await page.render({ canvasContext: pdfCtx, viewport: vp }).promise;
      redrawAll();
      updateUI();
    } catch(err) {
      setStatus('Render error: ' + err.message, 'error');
    }
  }

  // ── REDRAW ─────────────────────────────────────────────────────────────────
  function redrawAll() {
    drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
    (ann[currentPage] || []).forEach(a => paint(drawCtx, a));
  }

  function paint(ctx, a) {
    ctx.save();
    ctx.globalAlpha = a.opacity ?? 1;
    ctx.strokeStyle = a.color;
    ctx.fillStyle   = a.color;
    ctx.lineWidth   = a.size;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';

    if (a.type === 'draw' || a.type === 'signature') {
      if (!a.pts || a.pts.length < 2) { ctx.restore(); return; }
      ctx.beginPath();
      ctx.moveTo(a.pts[0].x, a.pts[0].y);
      a.pts.forEach(p => ctx.lineTo(p.x, p.y));
      ctx.stroke();

    } else if (a.type === 'highlight') {
      ctx.globalAlpha = 0.3;
      ctx.lineWidth   = a.size;
      if (!a.pts || a.pts.length < 2) { ctx.restore(); return; }
      ctx.beginPath();
      ctx.moveTo(a.pts[0].x, a.pts[0].y);
      a.pts.forEach(p => ctx.lineTo(p.x, p.y));
      ctx.stroke();

    } else if (a.type === 'text') {
      ctx.font      = a.tsize + 'px ' + a.tfont;
      ctx.fillStyle = a.color;
      ctx.globalAlpha = a.opacity ?? 1;
      a.text.split('\n').forEach((ln, i) =>
        ctx.fillText(ln, a.x, a.y + i * a.tsize * 1.3));

    } else if (a.type === 'rect') {
      ctx.strokeRect(a.x, a.y, a.w, a.h);

    } else if (a.type === 'ellipse') {
      if (!a.w || !a.h) { ctx.restore(); return; }
      ctx.beginPath();
      ctx.ellipse(a.x + a.w/2, a.y + a.h/2, Math.abs(a.w/2), Math.abs(a.h/2), 0, 0, Math.PI*2);
      ctx.stroke();

    } else if (a.type === 'line') {
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(a.x2, a.y2); ctx.stroke();

    } else if (a.type === 'arrow') {
      const ang = Math.atan2(a.y2-a.y, a.x2-a.x), hl = 12 + a.size * 2;
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(a.x2, a.y2); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(a.x2, a.y2);
      ctx.lineTo(a.x2-hl*Math.cos(ang-0.4), a.y2-hl*Math.sin(ang-0.4));
      ctx.lineTo(a.x2-hl*Math.cos(ang+0.4), a.y2-hl*Math.sin(ang+0.4));
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }

  // ── POINTER EVENTS ─────────────────────────────────────────────────────────
  function xy(e) {
    const r = drawCanvas.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (cx-r.left)*(drawCanvas.width/r.width), y: (cy-r.top)*(drawCanvas.height/r.height) };
  }

  drawCanvas.addEventListener('mousedown',  pointerDown);
  drawCanvas.addEventListener('mousemove',  pointerMove);
  drawCanvas.addEventListener('mouseup',    pointerUp);
  drawCanvas.addEventListener('mouseleave', e => { if (drawing) pointerUp(e); });
  drawCanvas.addEventListener('touchstart', e => { e.preventDefault(); pointerDown(e); }, {passive:false});
  drawCanvas.addEventListener('touchmove',  e => { e.preventDefault(); pointerMove(e); }, {passive:false});
  drawCanvas.addEventListener('touchend',   e => { e.preventDefault(); pointerUp(e); },  {passive:false});

  function pointerDown(e) {
    if (activeTool === 'text') { placeTextBox(xy(e)); return; }
    commitTextBox();
    drawing = true;
    shapeStart = xy(e);
    pathPts = [shapeStart];
  }

  function pointerMove(e) {
    if (!drawing) return;
    const pos = xy(e);

    if (['draw','highlight','signature','eraser'].includes(activeTool)) {
      pathPts.push(pos);
      if (activeTool === 'eraser') {
        const r2 = (strokeSize * 5) * (strokeSize * 5);
        ann[currentPage] = (ann[currentPage]||[]).filter(a => {
          if (a.pts) return !a.pts.some(p => (p.x-pos.x)**2+(p.y-pos.y)**2 < r2);
          if (a.type==='text') return (a.x-pos.x)**2+(a.y-pos.y)**2 > r2*4;
          return true;
        });
        redrawAll();
        return;
      }
      redrawAll();
      const live = { type: activeTool==='highlight'?'highlight':(activeTool==='signature'?'signature':'draw'),
        pts: pathPts, color: strokeColor,
        size: activeTool==='highlight' ? Math.max(strokeSize*5,18) : strokeSize,
        opacity: activeTool==='highlight' ? 0.3 : opacity };
      paint(drawCtx, live);

    } else {
      redrawAll();
      const dx = pos.x-shapeStart.x, dy = pos.y-shapeStart.y;
      drawCtx.save();
      drawCtx.globalAlpha = opacity;
      drawCtx.strokeStyle = strokeColor; drawCtx.fillStyle = strokeColor;
      drawCtx.lineWidth = strokeSize; drawCtx.lineCap='round'; drawCtx.lineJoin='round';
      if (activeTool==='rect') {
        drawCtx.strokeRect(shapeStart.x, shapeStart.y, dx, dy);
      } else if (activeTool==='ellipse' && Math.abs(dx)>1 && Math.abs(dy)>1) {
        drawCtx.beginPath();
        drawCtx.ellipse(shapeStart.x+dx/2, shapeStart.y+dy/2, Math.abs(dx/2), Math.abs(dy/2), 0, 0, Math.PI*2);
        drawCtx.stroke();
      } else if (activeTool==='line') {
        drawCtx.beginPath(); drawCtx.moveTo(shapeStart.x,shapeStart.y); drawCtx.lineTo(pos.x,pos.y); drawCtx.stroke();
      } else if (activeTool==='arrow') {
        const ang=Math.atan2(dy,dx), hl=12+strokeSize*2;
        drawCtx.beginPath(); drawCtx.moveTo(shapeStart.x,shapeStart.y); drawCtx.lineTo(pos.x,pos.y); drawCtx.stroke();
        drawCtx.beginPath();
        drawCtx.moveTo(pos.x,pos.y);
        drawCtx.lineTo(pos.x-hl*Math.cos(ang-0.4), pos.y-hl*Math.sin(ang-0.4));
        drawCtx.lineTo(pos.x-hl*Math.cos(ang+0.4), pos.y-hl*Math.sin(ang+0.4));
        drawCtx.closePath(); drawCtx.fill();
      }
      drawCtx.restore();
    }
  }

  function pointerUp(e) {
    if (!drawing) return;
    drawing = false;
    let end = shapeStart;
    try { end = xy(e); } catch(_) {}
    saveUndo();

    if ((activeTool==='draw'||activeTool==='signature') && pathPts.length>1) {
      ann[currentPage].push({type:activeTool, pts:[...pathPts], color:strokeColor, size:strokeSize, opacity});
    } else if (activeTool==='highlight' && pathPts.length>1) {
      ann[currentPage].push({type:'highlight', pts:[...pathPts], color:strokeColor, size:Math.max(strokeSize*5,18), opacity:0.3});
    } else if (activeTool==='eraser') {
      // already applied
    } else if (activeTool==='rect') {
      ann[currentPage].push({type:'rect', x:shapeStart.x, y:shapeStart.y, w:end.x-shapeStart.x, h:end.y-shapeStart.y, color:strokeColor, size:strokeSize, opacity});
    } else if (activeTool==='ellipse') {
      ann[currentPage].push({type:'ellipse', x:shapeStart.x, y:shapeStart.y, w:end.x-shapeStart.x, h:end.y-shapeStart.y, color:strokeColor, size:strokeSize, opacity});
    } else if (activeTool==='line') {
      ann[currentPage].push({type:'line', x:shapeStart.x, y:shapeStart.y, x2:end.x, y2:end.y, color:strokeColor, size:strokeSize, opacity});
    } else if (activeTool==='arrow') {
      ann[currentPage].push({type:'arrow', x:shapeStart.x, y:shapeStart.y, x2:end.x, y2:end.y, color:strokeColor, size:strokeSize, opacity});
    }
    redrawAll();
  }

  // ── TEXT BOX ───────────────────────────────────────────────────────────────
  function placeTextBox(pos) {
    commitTextBox();
    textBox.style.left       = pos.x + 'px';
    textBox.style.top        = (pos.y - textSize) + 'px';
    textBox.style.fontSize   = textSize + 'px';
    textBox.style.fontFamily = textFont;
    textBox.style.color      = strokeColor;
    textBox.style.display    = 'block';
    textBox.dataset.x = pos.x;
    textBox.dataset.y = pos.y;
    textBox.innerText = '';
    textBox.focus();
  }

  function commitTextBox() {
    if (textBox.style.display === 'none') return;
    const txt = textBox.innerText.trim();
    if (txt) {
      saveUndo();
      ann[currentPage].push({
        type:'text', text:txt,
        x: parseFloat(textBox.dataset.x),
        y: parseFloat(textBox.dataset.y),
        color: strokeColor, tsize: textSize, tfont: textFont, opacity
      });
      redrawAll();
    }
    textBox.style.display = 'none';
    textBox.innerText = '';
  }

  textBox.addEventListener('keydown', e => {
    if (e.key === 'Escape') { textBox.style.display='none'; textBox.innerText=''; }
  });
  drawCanvas.addEventListener('click', () => { if (activeTool !== 'text') commitTextBox(); });

  // ── UNDO / REDO ────────────────────────────────────────────────────────────
  function saveUndo() {
    undos[currentPage].push(JSON.stringify(ann[currentPage]));
    if (undos[currentPage].length > 60) undos[currentPage].shift();
    redos[currentPage] = [];
  }

  document.getElementById('undoBtn').addEventListener('click', () => {
    commitTextBox();
    if (!undos[currentPage].length) return;
    redos[currentPage].push(JSON.stringify(ann[currentPage]));
    ann[currentPage] = JSON.parse(undos[currentPage].pop());
    redrawAll();
  });

  document.getElementById('redoBtn').addEventListener('click', () => {
    if (!redos[currentPage].length) return;
    undos[currentPage].push(JSON.stringify(ann[currentPage]));
    ann[currentPage] = JSON.parse(redos[currentPage].pop());
    redrawAll();
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    commitTextBox(); saveUndo();
    ann[currentPage] = []; redrawAll();
  });

  // ── SAVE PDF ───────────────────────────────────────────────────────────────
  document.getElementById('saveBtn').addEventListener('click', async () => {
    commitTextBox();
    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    setStatus('Saving PDF...', 'info');

    try {
      const { PDFDocument, rgb, StandardFonts } = PDFLib;
      const doc  = await PDFDocument.load(pdfBytes.slice(0), { ignoreEncryption: true });
      const font = await doc.embedFont(StandardFonts.Helvetica);
      const pages = doc.getPages();

      for (let p = 1; p <= totalPages; p++) {
        const pageAnn = ann[p];
        if (!pageAnn || !pageAnn.length) continue;

        const pdfPage = pages[p-1];
        const { width: pgW, height: pgH } = pdfPage.getSize();
        const jsPage = await pdfJsDoc.getPage(p);
        const vp = jsPage.getViewport({ scale });
        const rx = pgW / vp.width, ry = pgH / vp.height;

        const px  = x => x * rx;
        const py  = y => pgH - y * ry;
        const ps  = s => s * rx;
        const col = hex => {
          const r = parseInt(hex.slice(1,3),16)/255;
          const g = parseInt(hex.slice(3,5),16)/255;
          const b = parseInt(hex.slice(5,7),16)/255;
          return rgb(r,g,b);
        };

        for (const a of pageAnn) {
          const c = col(a.color || '#000'), op = a.opacity ?? 1;
          if (a.type==='draw'||a.type==='signature') {
            if (!a.pts||a.pts.length<2) continue;
            for (let i=0;i<a.pts.length-1;i++) {
              pdfPage.drawLine({start:{x:px(a.pts[i].x),y:py(a.pts[i].y)},end:{x:px(a.pts[i+1].x),y:py(a.pts[i+1].y)},thickness:ps(a.size),color:c,opacity:op});
            }
          } else if (a.type==='highlight') {
            if (!a.pts||a.pts.length<2) continue;
            for (let i=0;i<a.pts.length-1;i++) {
              pdfPage.drawLine({start:{x:px(a.pts[i].x),y:py(a.pts[i].y)},end:{x:px(a.pts[i+1].x),y:py(a.pts[i+1].y)},thickness:ps(a.size),color:c,opacity:0.3});
            }
          } else if (a.type==='text') {
            const sz = Math.max(4, Math.round(ps(a.tsize)));
            a.text.split('\n').forEach((ln,i) => {
              try { pdfPage.drawText(ln,{x:px(a.x),y:py(a.y)-i*sz*1.3,size:sz,font,color:c,opacity:op}); } catch(_){}
            });
          } else if (a.type==='rect') {
            const rw=ps(Math.abs(a.w)), rh=ps(Math.abs(a.h));
            pdfPage.drawRectangle({x:px(a.x),y:py(a.y)-rh,width:rw,height:rh,borderColor:c,borderWidth:ps(a.size),opacity:op});
          } else if (a.type==='ellipse') {
            const xS=ps(Math.abs(a.w/2)), yS=ps(Math.abs(a.h/2));
            if (xS>0&&yS>0) pdfPage.drawEllipse({x:px(a.x+a.w/2),y:py(a.y+a.h/2),xScale:xS,yScale:yS,borderColor:c,borderWidth:ps(a.size),opacity:op});
          } else if (a.type==='line') {
            pdfPage.drawLine({start:{x:px(a.x),y:py(a.y)},end:{x:px(a.x2),y:py(a.y2)},thickness:ps(a.size),color:c,opacity:op});
          } else if (a.type==='arrow') {
            pdfPage.drawLine({start:{x:px(a.x),y:py(a.y)},end:{x:px(a.x2),y:py(a.y2)},thickness:ps(a.size),color:c,opacity:op});
          }
        }
      }

      const out = await doc.save();
      const name = (currentFile?.name||'document').replace(/\.pdf$/i,'') + '-edited.pdf';
      const blob = new Blob([out], {type:'application/pdf'});
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = name; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
      setStatus('✓ PDF saved successfully!', 'success');
    } catch(err) {
      setStatus('Save failed: ' + err.message, 'error');
      console.error(err);
    } finally {
      btn.disabled = false;
    }
  });

  // ── PAGE NAVIGATION ────────────────────────────────────────────────────────
  document.getElementById('prevPage').addEventListener('click', () => {
    if (currentPage>1) { commitTextBox(); currentPage--; renderPage(); highlightThumb(); }
  });
  document.getElementById('nextPage').addEventListener('click', () => {
    if (currentPage<totalPages) { commitTextBox(); currentPage++; renderPage(); highlightThumb(); }
  });
  document.getElementById('zoomIn').addEventListener('click',  () => { scale=Math.min(scale+0.25,3.5); renderPage(); });
  document.getElementById('zoomOut').addEventListener('click', () => { scale=Math.max(scale-0.25,0.5); renderPage(); });

  function updateUI() {
    document.getElementById('pageInfo').textContent = 'Page '+currentPage+' / '+totalPages;
    document.getElementById('zoomLabel').textContent = Math.round((scale/1.5)*100)+'%';
    document.getElementById('prevPage').disabled = currentPage<=1;
    document.getElementById('nextPage').disabled = currentPage>=totalPages;
  }

  // ── THUMBNAILS ─────────────────────────────────────────────────────────────
  async function buildThumbs() {
    thumbStrip.innerHTML = '';
    for (let i=1; i<=totalPages; i++) {
      const item = document.createElement('div');
      item.className = 'thumb-item'+(i===1?' active':'');
      item.dataset.p = i;
      const pg = await pdfJsDoc.getPage(i);
      const vp = pg.getViewport({scale:0.12});
      const tc = document.createElement('canvas');
      tc.width=vp.width; tc.height=vp.height;
      await pg.render({canvasContext:tc.getContext('2d'),viewport:vp}).promise;
      item.appendChild(tc);
      item.addEventListener('click', () => { commitTextBox(); currentPage=i; renderPage(); highlightThumb(); });
      thumbStrip.appendChild(item);
    }
  }

  function highlightThumb() {
    document.querySelectorAll('.thumb-item').forEach(t =>
      t.classList.toggle('active', parseInt(t.dataset.p)===currentPage));
  }

  // ── TOOL BUTTONS ──────────────────────────────────────────────────────────
  document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
    btn.addEventListener('click', () => {
      commitTextBox();
      activeTool = btn.dataset.tool;
      document.querySelectorAll('.tool-btn[data-tool]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const cur = {draw:'crosshair',text:'text',highlight:'crosshair',rect:'crosshair',
                   ellipse:'crosshair',line:'crosshair',arrow:'crosshair',signature:'crosshair',eraser:'cell'};
      drawCanvas.style.cursor = cur[activeTool]||'crosshair';
    });
  });

  // ── COLORS ────────────────────────────────────────────────────────────────
  document.querySelectorAll('.swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
      sw.classList.add('active');
      strokeColor = sw.dataset.color;
      document.getElementById('customColor').value = strokeColor;
    });
  });
  document.getElementById('customColor').addEventListener('input', e => {
    strokeColor = e.target.value;
    document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
  });

  // ── SLIDERS ───────────────────────────────────────────────────────────────
  document.getElementById('strokeSz').addEventListener('input', e => {
    strokeSize = parseInt(e.target.value);
    document.getElementById('szLabel').textContent = strokeSize;
  });
  document.getElementById('opSlider').addEventListener('input', e => {
    opacity = parseInt(e.target.value)/100;
    document.getElementById('opLabel').textContent = e.target.value;
  });
  document.getElementById('textSz').addEventListener('input', e => {
    textSize = parseInt(e.target.value);
    document.getElementById('txSzLabel').textContent = textSize;
  });
  document.getElementById('textFont').addEventListener('change', e => {
    textFont = e.target.value;
  });

  // ── KEYBOARD SHORTCUTS ────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (document.activeElement === textBox) return;
    const map = {d:'draw',t:'text',h:'highlight',r:'rect',e:'ellipse',l:'line',a:'arrow',s:'signature',x:'eraser'};
    if (map[e.key]) document.querySelector('.tool-btn[data-tool="'+map[e.key]+'"]')?.click();
    if ((e.ctrlKey||e.metaKey)&&e.key==='z') { e.preventDefault(); document.getElementById('undoBtn').click(); }
    if ((e.ctrlKey||e.metaKey)&&e.key==='y') { e.preventDefault(); document.getElementById('redoBtn').click(); }
  });

  // ── HELPERS ────────────────────────────────────────────────────────────────
  function setStatus(msg, type='error') {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status-msg show ' + type;
  }
  function hideStatus() {
    document.getElementById('statusMsg').className = 'status-msg';
  }

}); // end window.load
</script>
</body>
</html>
