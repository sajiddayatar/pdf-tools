<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Page Numbers — PDFTools</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .preview-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; margin-top:0.5rem; }
    .pos-btn { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:0.5rem; cursor:pointer; font-family:var(--font-mono); font-size:0.75rem; color:var(--muted); transition:all 0.2s; text-align:center; }
    .pos-btn.active { background:rgba(255,85,51,0.1); border-color:var(--accent); color:var(--accent); }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="../index.html">PDF<span>Tools</span></a>
</nav>

<div class="tool-page">
  <div class="tool-page-header">
    <a class="back-link" href="../index.html">← Back to tools</a>
    <h1>🔢 Add Page Numbers</h1>
    <p>Stamp customizable page numbers onto every page of your PDF.</p>
  </div>

  <div class="drop-zone" id="dropZone">
    <input type="file" accept=".pdf" id="fileInput">
    <div class="drop-icon">🔢</div>
    <h3>Drop your PDF here</h3>
    <p>or click to browse</p>
  </div>

  <div id="info" style="display:none">
    <div class="file-list" id="fileItem"></div>

    <div class="controls">
      <div class="control-group">
        <label>POSITION</label>
        <div class="preview-grid">
          <button class="pos-btn" data-pos="top-left">↖ Top Left</button>
          <button class="pos-btn" data-pos="top-center">↑ Top Center</button>
          <button class="pos-btn active" data-pos="bottom-center">↓ Bottom Center</button>
          <button class="pos-btn" data-pos="bottom-right">↘ Bottom Right</button>
        </div>
      </div>

      <div class="control-row">
        <div class="control-group">
          <label>FORMAT</label>
          <select id="format">
            <option value="page">1, 2, 3 ...</option>
            <option value="page-of-total">1 of 10, 2 of 10 ...</option>
            <option value="page-dash-total">1/10, 2/10 ...</option>
            <option value="roman">i, ii, iii ...</option>
          </select>
        </div>
        <div class="control-group">
          <label>START NUMBER</label>
          <input type="number" id="startNum" value="1" min="1">
        </div>
      </div>

      <div class="control-row">
        <div class="control-group">
          <label>FONT SIZE (pt)</label>
          <input type="number" id="fontSize" value="12" min="6" max="36">
        </div>
        <div class="control-group">
          <label>MARGIN (pt)</label>
          <input type="number" id="margin" value="20" min="5" max="80">
        </div>
        <div class="control-group">
          <label>COLOR</label>
          <input type="color" id="color" value="#333333" style="height:38px;padding:2px;background:var(--bg);border:1px solid var(--border);border-radius:8px;cursor:pointer">
        </div>
      </div>

      <div class="control-group">
        <label>PREFIX / SUFFIX (optional)</label>
        <div style="display:flex;gap:0.5rem">
          <input type="text" id="prefix" placeholder="Prefix e.g. 'Page '" style="flex:1">
          <input type="text" id="suffix" placeholder="Suffix e.g. '.'" style="flex:1">
        </div>
      </div>

      <div class="control-group">
        <label>SKIP PAGES (comma-separated, e.g. 1 to skip first page)</label>
        <input type="text" id="skipPages" placeholder="e.g. 1, 2">
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" id="addBtn">🔢 Add Page Numbers</button>
    </div>

    <div class="progress-bar" id="progressBar" style="display:none">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="status-msg" id="status"></div>
  </div>
</div>

<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="../js/common.js"></script>
<script>
  const { PDFDocument, rgb, StandardFonts } = PDFLib;
  let currentFile = null;
  let selectedPos = 'bottom-center';

  // Position buttons
  document.querySelectorAll('.pos-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedPos = btn.dataset.pos;
    };
  });

  Utils.setupDropZone(document.getElementById('dropZone'), files => {
    if (!files[0]) return;
    currentFile = files[0];
    document.getElementById('fileItem').innerHTML = '';
    document.getElementById('fileItem').appendChild(
      Utils.createFileItem(currentFile, () => { currentFile = null; document.getElementById('info').style.display = 'none'; })
    );
    document.getElementById('info').style.display = 'block';
  });

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3), 16) / 255;
    const g = parseInt(hex.slice(3,5), 16) / 255;
    const b = parseInt(hex.slice(5,7), 16) / 255;
    return rgb(r, g, b);
  }

  function toRoman(n) {
    const vals = [1000,900,500,400,100,90,50,40,10,9,5,4,1];
    const syms = ['m','cm','d','cd','c','xc','l','xl','x','ix','v','iv','i'];
    let result = '';
    for (let i = 0; i < vals.length; i++) { while (n >= vals[i]) { result += syms[i]; n -= vals[i]; } }
    return result;
  }

  document.getElementById('addBtn').onclick = async () => {
    if (!currentFile) return;
    const btn = document.getElementById('addBtn');
    btn.disabled = true;
    const status = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    progressBar.style.display = 'block';
    Utils.showStatus(status, 'Adding page numbers...', 'info');

    try {
      const bytes = await Utils.readFileAsArrayBuffer(currentFile);
      const pdfDoc = await PDFDocument.load(bytes, { ignoreEncryption: true });
      const font = await pdfDoc.embedFont(StandardFonts.Helvetica);
      const pages = pdfDoc.getPages();
      const total = pages.length;

      const fontSize = parseInt(document.getElementById('fontSize').value) || 12;
      const margin = parseInt(document.getElementById('margin').value) || 20;
      const format = document.getElementById('format').value;
      const startNum = parseInt(document.getElementById('startNum').value) || 1;
      const color = hexToRgb(document.getElementById('color').value);
      const prefix = document.getElementById('prefix').value;
      const suffix = document.getElementById('suffix').value;
      const skipStr = document.getElementById('skipPages').value;
      const skipPages = skipStr ? skipStr.split(',').map(s => parseInt(s.trim())).filter(Boolean) : [];

      pages.forEach((page, i) => {
        if (skipPages.includes(i + 1)) return;
        const pageNum = startNum + i;
        const { width, height } = page.getSize();

        let label;
        if (format === 'page') label = String(pageNum);
        else if (format === 'page-of-total') label = `${pageNum} of ${startNum + total - 1}`;
        else if (format === 'page-dash-total') label = `${pageNum}/${startNum + total - 1}`;
        else label = toRoman(pageNum);

        label = prefix + label + suffix;
        const textWidth = font.widthOfTextAtSize(label, fontSize);

        let x, y;
        if (selectedPos === 'top-left') { x = margin; y = height - margin - fontSize; }
        else if (selectedPos === 'top-center') { x = (width - textWidth) / 2; y = height - margin - fontSize; }
        else if (selectedPos === 'bottom-center') { x = (width - textWidth) / 2; y = margin; }
        else { x = width - textWidth - margin; y = margin; }

        page.drawText(label, { x, y, size: fontSize, font, color });
        Utils.setProgress(progressFill, ((i + 1) / total) * 100);
      });

      const outBytes = await pdfDoc.save();
      Utils.downloadBlob(new Blob([outBytes], { type: 'application/pdf' }), 'numbered.pdf');
      Utils.showStatus(status, `✓ Added page numbers to ${total} pages!`, 'success');
    } catch (err) {
      Utils.showStatus(status, '✕ Error: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      setTimeout(() => progressBar.style.display = 'none', 1500);
    }
  };
</script>
</body>
</html>
