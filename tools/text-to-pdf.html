<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text to PDF — PDFTools</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav>
  <a class="nav-logo" href="../index.html">PDF<span>Tools</span></a>
</nav>

<div class="tool-page">
  <div class="tool-page-header">
    <a class="back-link" href="../index.html">← Back to tools</a>
    <h1>📄 Text → PDF</h1>
    <p>Type or paste text content and convert it to a formatted PDF.</p>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>TITLE (optional)</label>
      <input type="text" id="title" placeholder="Document title">
    </div>
    <div class="control-group">
      <label>CONTENT</label>
      <textarea id="content" placeholder="Type or paste your text here...&#10;&#10;You can use:&#10;# Heading 1&#10;## Heading 2&#10;### Heading 3&#10;- Bullet point&#10;1. Numbered item" style="min-height:250px"></textarea>
    </div>
    <div class="control-row">
      <div class="control-group">
        <label>PAGE SIZE</label>
        <select id="pageSize">
          <option value="A4" selected>A4</option>
          <option value="Letter">Letter</option>
          <option value="Legal">Legal</option>
        </select>
      </div>
      <div class="control-group">
        <label>FONT SIZE</label>
        <input type="number" id="fontSize" value="11" min="6" max="24">
      </div>
      <div class="control-group">
        <label>LINE SPACING</label>
        <select id="lineSpacing">
          <option value="1">Single</option>
          <option value="1.5" selected>1.5×</option>
          <option value="2">Double</option>
        </select>
      </div>
    </div>
    <div class="control-row">
      <div class="control-group">
        <label>FONT</label>
        <select id="fontFamily">
          <option value="Helvetica">Helvetica</option>
          <option value="Times">Times Roman</option>
          <option value="Courier">Courier (Monospace)</option>
        </select>
      </div>
      <div class="control-group">
        <label>TEXT COLOR</label>
        <input type="color" id="textColor" value="#111111" style="height:38px;padding:2px;background:var(--bg);border:1px solid var(--border);border-radius:8px;cursor:pointer">
      </div>
      <div class="control-group">
        <label>MARGIN (pt)</label>
        <input type="number" id="margin" value="60" min="20" max="120">
      </div>
    </div>
    <div class="control-group">
      <label>OPTIONS</label>
      <div style="display:flex;gap:1.5rem;flex-wrap:wrap">
        <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;font-size:0.85rem">
          <input type="checkbox" id="addPageNums" checked style="accent-color:var(--accent)"> Add page numbers
        </label>
        <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;font-size:0.85rem">
          <input type="checkbox" id="addDate" style="accent-color:var(--accent)"> Add date header
        </label>
      </div>
    </div>
  </div>

  <div class="btn-group">
    <button class="btn btn-primary" id="convertBtn">📄 Generate PDF</button>
    <button class="btn btn-secondary" id="loadFileBtn">📂 Load from .txt file</button>
    <input type="file" id="txtFile" accept=".txt" style="display:none">
  </div>

  <div class="progress-bar" id="progressBar" style="display:none">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="status-msg" id="status"></div>
</div>

<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="../js/common.js"></script>
<script>
  const { PDFDocument, rgb, StandardFonts } = PDFLib;

  document.getElementById('loadFileBtn').onclick = () => document.getElementById('txtFile').click();
  document.getElementById('txtFile').onchange = async e => {
    const file = e.target.files[0];
    if (file) {
      const text = await Utils.readFileAsText(file);
      document.getElementById('content').value = text;
      if (!document.getElementById('title').value) {
        document.getElementById('title').value = file.name.replace('.txt', '');
      }
    }
  };

  function hexToRgb(hex) {
    return rgb(parseInt(hex.slice(1,3),16)/255, parseInt(hex.slice(3,5),16)/255, parseInt(hex.slice(5,7),16)/255);
  }

  document.getElementById('convertBtn').onclick = async () => {
    const content = document.getElementById('content').value.trim();
    if (!content) { Utils.showStatus(document.getElementById('status'), 'Please enter some text.', 'error'); return; }

    const btn = document.getElementById('convertBtn');
    btn.disabled = true;
    const status = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    progressBar.style.display = 'block';
    Utils.showStatus(status, 'Generating PDF...', 'info');
    Utils.setProgress(progressFill, 20);

    try {
      const pdfDoc = await PDFDocument.create();
      const fontName = document.getElementById('fontFamily').value;

      const fontMap = {
        Helvetica: [StandardFonts.Helvetica, StandardFonts.HelveticaBold],
        Times: [StandardFonts.TimesRoman, StandardFonts.TimesRomanBold],
        Courier: [StandardFonts.Courier, StandardFonts.CourierBold]
      };
      const [regularFontName, boldFontName] = fontMap[fontName];
      const regularFont = await pdfDoc.embedFont(regularFontName);
      const boldFont = await pdfDoc.embedFont(boldFontName);

      const pageSizeMap = { A4: [595,842], Letter: [612,792], Legal: [612,1008] };
      const [pgW, pgH] = pageSizeMap[document.getElementById('pageSize').value];
      const margin = parseInt(document.getElementById('margin').value) || 60;
      const fontSize = parseInt(document.getElementById('fontSize').value) || 11;
      const lineSpacing = parseFloat(document.getElementById('lineSpacing').value) || 1.5;
      const lineHeight = fontSize * lineSpacing;
      const textColor = hexToRgb(document.getElementById('textColor').value);
      const maxWidth = pgW - margin * 2;

      const lines = content.split('\n');
      const titleText = document.getElementById('title').value;
      const addPageNums = document.getElementById('addPageNums').checked;
      const addDate = document.getElementById('addDate').checked;

      let pages = [];
      let page = pdfDoc.addPage([pgW, pgH]);
      pages.push(page);
      let y = pgH - margin;

      function newPage() {
        page = pdfDoc.addPage([pgW, pgH]);
        pages.push(page);
        y = pgH - margin;
      }

      function wrapLine(text, size, font) {
        const words = text.split(' ');
        const result = [];
        let line = '';
        for (const w of words) {
          const test = line ? line + ' ' + w : w;
          if (font.widthOfTextAtSize(test, size) > maxWidth) {
            if (line) result.push(line);
            line = w;
          } else line = test;
        }
        if (line) result.push(line);
        return result.length ? result : [''];
      }

      function drawLine(text, size, font) {
        if (y < margin + size) newPage();
        if (text) page.drawText(text, { x: margin, y, size, font, color: textColor });
        y -= lineHeight;
      }

      // Title
      if (titleText) {
        drawLine(titleText, fontSize + 6, boldFont);
        y -= 8;
        page.drawLine({ start:{x:margin,y:y+4}, end:{x:pgW-margin,y:y+4}, thickness:0.5, color:rgb(0.7,0.7,0.7) });
        y -= 8;
      }

      // Date
      if (addDate) {
        drawLine(new Date().toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'}), fontSize - 1, regularFont);
        y -= 8;
      }

      Utils.setProgress(progressFill, 50);

      // Content
      for (const line of lines) {
        if (line.startsWith('### ')) {
          y -= 4;
          wrapLine(line.slice(4), fontSize + 2, boldFont).forEach(l => drawLine(l, fontSize + 2, boldFont));
          y -= 4;
        } else if (line.startsWith('## ')) {
          y -= 6;
          wrapLine(line.slice(3), fontSize + 5, boldFont).forEach(l => drawLine(l, fontSize + 5, boldFont));
          y -= 6;
        } else if (line.startsWith('# ')) {
          y -= 10;
          wrapLine(line.slice(2), fontSize + 9, boldFont).forEach(l => drawLine(l, fontSize + 9, boldFont));
          y -= 10;
        } else if (line.startsWith('- ') || line.startsWith('* ')) {
          wrapLine('• ' + line.slice(2), fontSize, regularFont).forEach(l => drawLine(l, fontSize, regularFont));
        } else if (/^\d+\. /.test(line)) {
          wrapLine(line, fontSize, regularFont).forEach(l => drawLine(l, fontSize, regularFont));
        } else if (line.trim() === '') {
          y -= lineHeight * 0.5;
        } else {
          wrapLine(line, fontSize, regularFont).forEach(l => drawLine(l, fontSize, regularFont));
        }
      }

      // Page numbers
      if (addPageNums) {
        pages.forEach((pg, i) => {
          const numText = `${i + 1} / ${pages.length}`;
          const w = regularFont.widthOfTextAtSize(numText, 9);
          pg.drawText(numText, { x: (pgW - w) / 2, y: margin / 2, size: 9, font: regularFont, color: rgb(0.5,0.5,0.5) });
        });
      }

      Utils.setProgress(progressFill, 90);
      const outBytes = await pdfDoc.save();
      Utils.downloadBlob(new Blob([outBytes], { type: 'application/pdf' }), (titleText || 'document') + '.pdf');
      Utils.setProgress(progressFill, 100);
      Utils.showStatus(status, `✓ PDF generated (${pages.length} pages)!`, 'success');
    } catch (err) {
      Utils.showStatus(status, '✕ Error: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      setTimeout(() => progressBar.style.display = 'none', 1500);
    }
  };
</script>
</body>
</html>
